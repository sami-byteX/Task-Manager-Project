{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tasks.css' %}">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="#">Task Manager</a>
      </div>
    </nav>

    <main class="container mb-5">
      <div class="row g-4">
        <div class="col-12 col-lg-4">
          <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span id="form-title" class="fw-semibold">Create Task</span>
              <span class="badge bg-secondary" id="task-count-badge">0 tasks</span>
            </div>
            <div class="card-body">
              <form id="task-form" novalidate>
                <input type="hidden" id="task-id">
                <div class="mb-3">
                  <label for="title" class="form-label">Title</label>
                  <input type="text" class="form-control" id="title" required maxlength="255" placeholder="e.g. Write documentation">
                  <div class="invalid-feedback">
                    Title is required.
                  </div>
                </div>
                <div class="mb-3">
                  <label for="description" class="form-label">Description</label>
                  <textarea class="form-control" id="description" rows="3" placeholder="Optional details"></textarea>
                </div>
                <div class="form-check form-switch mb-3">
                  <input class="form-check-input" type="checkbox" id="completed">
                  <label class="form-check-label" for="completed">Completed</label>
                </div>
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary flex-grow-1" id="submit-btn">
                    <span class="spinner-border spinner-border-sm me-2 d-none" id="submit-spinner" role="status" aria-hidden="true"></span>
                    <span id="submit-text">Create Task</span>
                  </button>
                  <button type="button" class="btn btn-outline-secondary d-none" id="cancel-edit-btn">
                    Cancel
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-8">
          <div class="card shadow-sm">
            <div class="card-header">
              <div class="row g-2 align-items-center">
                <div class="col-md-4">
                  <input type="search" class="form-control" id="search-input" placeholder="Search by title or description">
                </div>
                <div class="col-md-4">
                  <select class="form-select" id="status-filter">
                    <option value="all">All statuses</option>
                    <option value="completed">Completed</option>
                    <option value="pending">Pending</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <select class="form-select" id="sort-select">
                    <option value="-created_at">Newest first</option>
                    <option value="created_at">Oldest first</option>
                    <option value="title">Title A–Z</option>
                    <option value="-title">Title Z–A</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="card-body p-0">
              <div id="alert-container" class="p-3"></div>
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="tasks-table">
                  <thead class="table-light">
                    <tr>
                      <th style="width: 3rem;"></th>
                      <th>Title</th>
                      <th class="d-none d-md-table-cell">Description</th>
                      <th style="width: 8rem;">Status</th>
                      <th style="width: 10rem;" class="text-end">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="tasks-body">
                    <tr id="empty-row">
                      <td colspan="5" class="text-center text-muted py-4">
                        No tasks yet. Create your first task on the left.
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div class="text-center py-3 d-none" id="list-loading">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Delete confirmation modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="deleteModalLabel">Delete task</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            Are you sure you want to delete this task?
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirm-delete-btn">
              <span class="spinner-border spinner-border-sm me-2 d-none" id="delete-spinner" role="status" aria-hidden="true"></span>
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/tasks.js' %}"></script>
  </body>
  </html>
